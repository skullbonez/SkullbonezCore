# SkullbonezCore Engine Configuration
# All values are optional -- omitting a key uses the built-in default.
# Reload requires a restart.

# ---------------------------------------------------------------------------
# Window
# ---------------------------------------------------------------------------
screen_x        = 1200
screen_y        = 900
fullscreen      = 0
bits_per_pixel  = 32
refresh_rate    = 75

# ---------------------------------------------------------------------------
# Frustum
# ---------------------------------------------------------------------------
frustum_near    = 1.0
frustum_far     = 5500.0

# ---------------------------------------------------------------------------
# Camera controls
# ---------------------------------------------------------------------------
mouse_sensitivity          = 0.2
key_speed                  = 200.0
camera_tween_rate          = 3.0
camera_collision_threshold = 0.01
min_camera_height          = 1.5
max_camera_height          = 110.0
min_view_mag               = 2.0
max_view_mag               = 300.0

# ---------------------------------------------------------------------------
# Terrain
# ---------------------------------------------------------------------------
terrain_scale        = 5.0
terrain_height_scale = 0.15

# ---------------------------------------------------------------------------
# Skybox
# ---------------------------------------------------------------------------
skybox_render_height = 30.0
skybox_overflow      = 1
skybox_scale         = 10.0

# ---------------------------------------------------------------------------
# Physics
# ---------------------------------------------------------------------------
gravity          = -30.0
fluid_height     = 25.0
fluid_density    = 1.0
gas_density      = 0.0
velocity_limit   = 5.0
sphere_drag_coeff = 0.4
friction_coeff   = 0.1
broadphase_cell  = 11.0

# ---------------------------------------------------------------------------
# Shadows
# ---------------------------------------------------------------------------
shadow_max_height = 50.0
shadow_max_alpha  = 0.5
shadow_offset     = 0.2
shadow_segments   = 16
shadow_scale      = 1.2

# ---------------------------------------------------------------------------
# Ball spawn ranges  (legacy random mode)
# ---------------------------------------------------------------------------
spawn_x_base           = 400.0
spawn_x_range          = 400
spawn_y_base           = 100.0
spawn_y_range          = 250
spawn_z_base           = 400.0
spawn_z_range          = 400
ball_mass_min          = 50.0
ball_mass_range        = 50
ball_moment_min        = 5.0
ball_moment_range      = 15
ball_restitution_min   = 0.5
ball_restitution_range = 5
ball_radius_range      = 10
ball_force_range       = 1000

# ---------------------------------------------------------------------------
# Asset paths
# ---------------------------------------------------------------------------
sky_front       = SkullbonezData/sky1.jpg
sky_left        = SkullbonezData/sky2.jpg
sky_back        = SkullbonezData/sky3.jpg
sky_right       = SkullbonezData/sky4.jpg
sky_up          = SkullbonezData/sky5.jpg
sky_down        = SkullbonezData/sky6.jpg
terrain_texture = SkullbonezData/ground.jpg
sphere_texture  = SkullbonezData/boundingSphere.jpg
terrain_raw     = SkullbonezData/terrain.raw

# ---------------------------------------------------------------------------
# Water
# ---------------------------------------------------------------------------
ocean_wave_height     = 4.0    # vertex displacement amplitude (default 4.0, was 1.5 hardcoded)
ocean_perturb_strength = 0.002 # UV perturbation scale for reflection shimmer (default 0.002)

# ---------------------------------------------------------------------------
# Debug / rendering flags
# ---------------------------------------------------------------------------
render_collision_volumes = 0
